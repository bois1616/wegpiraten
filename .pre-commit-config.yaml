# Pre-commit Konfiguration für Wegpiraten
# Installation: pip install pre-commit && pre-commit install
# Manuell ausführen: pre-commit run --all-files

repos:
  # Ruff - Linting und Formatierung
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Pyright - Type Checking (lokaler Hook)
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: .venv/bin/pyright
        language: system
        types: [python]
        args:
          - src/cli.py
          - src/shared_modules
          - src/pydantic_models
          - src/invoices
          - src/time_sheets
          - src/data_imports
        pass_filenames: false

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

# CI-Konfiguration
ci:
  autofix_commit_msg: "style: auto-fix von pre-commit hooks"
  autoupdate_commit_msg: "chore: pre-commit hooks aktualisiert"
