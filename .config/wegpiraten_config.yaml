      #   type: float
      #   excel_column: km_Pauschale
      #   format: ${numeric_format}
      #   decimals: 2
      #   is_position: false
      #   sum: true
      #   optional: true
      # - name: total_hours
      #   type: float
      #   excel_column: Stunden
      #   format: ${numeric_format}
      #   decimals: 2
      #   is_position: true
      #   sum: true
      # - name: total_costs
      #   type: currency
      #   excel_column: Kosten
      #   format: ${currency_format}
      #   is_position: true
      #   sum: true
      - name: service_requester_name
        type: str
        excel_column: Leistungsbesteller
      - name: payer_id
        type: str
        excel_column: ZDNR

